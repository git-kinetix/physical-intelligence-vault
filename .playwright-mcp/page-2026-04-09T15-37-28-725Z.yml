        - text: 2 scales the original
        - link "V-JEPA" [ref=e156] [cursor=pointer]:
          - /url: ../V-JEPA
        - text: framework to significantly larger models and datasets, pretraining on
        - link "VideoMix22M" [ref=e157] [cursor=pointer]:
          - /url: ../Datasets/VideoMix22M
        - text: — a dataset comprising over 1 million hours of internet video and images (22M samples across
        - link "SSv2" [ref=e158] [cursor=pointer]:
          - /url: ../Something-Something-v2
        - text: ", Kinetics,"
        - link "HowTo100M" [ref=e159] [cursor=pointer]:
