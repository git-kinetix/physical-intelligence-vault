        - text: "framework with several scaling improvements:"
      - paragraph [ref=e195]:
        - strong [ref=e196]: "Self-Supervised Pretraining:"
      - list [ref=e197]:
        - listitem [ref=e198]:
          - strong [ref=e199]: Encoder
          - text: ": ViT-g/16 (1B parameters) processes visible video patches"
        - listitem [ref=e200]:
          - strong [ref=e201]: Predictor
          - text: ": A transformer predicts latent representations of masked spatiotemporal regions"
        - listitem [ref=e202]:
