        - text: ","
        - link "YT-Temporal-1B" [ref=e160] [cursor=pointer]:
          - /url: ../Datasets/YouTube-Temporal-1B
        - text: ", and ImageNet). The paper demonstrates that self-supervised video models can serve as versatile visual encoders for understanding, prediction, and robotic planning."
        - link "V-JEPA" [ref=e161] [cursor=pointer]:
          - /url: ../V-JEPA
        - text: 2 achieves strong performance on motion understanding (77.3% top-1 on
        - link "SSv2" [ref=e162] [cursor=pointer]:
          - /url: ../Something-Something-v2
        - text: ), state-of-the-art action anticipation (39.7
        - link "Recall@5" [ref=e163] [cursor=pointer]:
          - /url: ../Metrics/Recall@5
        - text: "on"
        - link "Epic-Kitchens" [ref=e164] [cursor=pointer]:
          - /url: ../Datasets/EPIC-KITCHENS-100
        - text: "-100), and competitive video question-answering when aligned with an LLM."
      - paragraph [ref=e165]:
        - text: A major contribution is
        - link "V-JEPA" [ref=e166] [cursor=pointer]:
          - /url: ../V-JEPA
        - text: 2-AC (Action-Conditioned), a latent world model variant trained on less than 62 hours of unlabeled robot videos from the Droid dataset.
        - link "V-JEPA" [ref=e167] [cursor=pointer]:
          - /url: ../V-JEPA
        - text: 2-AC enables zero-shot robotic manipulation (reaching, grasping, pick-and-place) on Franka arms through planning with image goals — without collecting any task-specific data, training, or reward signals. The system plans in latent space, achieving 80% success on pick-and-place tasks for cups and 65% for boxes, substantially outperforming baselines like
        - link "Octo" [ref=e168] [cursor=pointer]:
          - /url: ../Octo
        - text: and
        - link "Cosmos" [ref=e169] [cursor=pointer]:
          - /url: ../NVIDIA-Cosmos
        - text: .
