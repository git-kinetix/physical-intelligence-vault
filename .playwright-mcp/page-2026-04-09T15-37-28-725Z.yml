            - /url: ../V-JEPA
          - text: 2-AC, an action-conditioned world model for zero-shot robotic planning from latent features
        - listitem [ref=e184]: Demonstrates zero-shot robotic manipulation using only 62 hours of unlabeled robot video, no task-specific training
        - listitem [ref=e185]: "Shows systematic scaling benefits: +4.0 points average from scaling data, model, training, and resolution"
        - listitem [ref=e186]: Achieves state-of-the-art Video QA at 8B parameter scale when combined with Llama 3.1 8B
