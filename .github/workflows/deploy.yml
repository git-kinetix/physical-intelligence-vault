name: Build and Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout vault
        uses: actions/checkout@v4

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        run: cd quartz && npm ci

      - name: Copy vault content to Quartz
        run: |
          rm -rf quartz/content/*
          cp -r Papers quartz/content/Papers
          cp -r Metrics quartz/content/Metrics
          cp -r Datasets quartz/content/Datasets
          cp MOC.md quartz/content/index.md
          cp "Metrics Index.md" quartz/content/
          cp "Datasets Index.md" quartz/content/

      - name: Convert PDF embeds to iframes
        run: |
          cd quartz/content/Papers
          for f in *.md; do
            if grep -q '^!PDFs/' "$f" || grep -q '!\[\[PDFs/' "$f"; then
              sed -i 's|^!\[\[PDFs/\(.*\)\.pdf\]\]|<iframe src="/PDFs/\1.pdf" width="100%" height="800px" style="border: 1px solid #333; border-radius: 8px; margin-bottom: 1em;"></iframe>|' "$f"
              sed -i 's|^!PDFs/\(.*\)\.pdf|<iframe src="/PDFs/\1.pdf" width="100%" height="800px" style="border: 1px solid #333; border-radius: 8px; margin-bottom: 1em;"></iframe>|' "$f"
            fi
          done

      - name: Apply Quartz config
        run: |
          cat > quartz/quartz.config.ts << 'QCONFIG'
          import { QuartzConfig } from "./quartz/cfg"
          import * as Plugin from "./quartz/plugins"
          const config: QuartzConfig = {
            configuration: {
              pageTitle: "Physical Intelligence Vault",
              pageTitleSuffix: "",
              enableSPA: true,
              enablePopovers: true,
              analytics: null,
              locale: "en-US",
              baseUrl: "${{ vars.CLOUDFRONT_DOMAIN }}",
              ignorePatterns: ["private", "templates", ".obsidian", "PDFs"],
              defaultDateType: "modified",
              theme: {
                fontOrigin: "googleFonts",
                cdnCaching: true,
                typography: { header: "Schibsted Grotesk", body: "Source Sans Pro", code: "IBM Plex Mono" },
                colors: {
                  lightMode: { light: "#faf8f8", lightgray: "#e5e5e5", gray: "#b8b8b8", darkgray: "#4e4e4e", dark: "#2b2b2b", secondary: "#284b63", tertiary: "#84a59d", highlight: "rgba(143, 159, 169, 0.15)", textHighlight: "#fff23688" },
                  darkMode: { light: "#161618", lightgray: "#393639", gray: "#646464", darkgray: "#d4d4d4", dark: "#ebebec", secondary: "#7b97aa", tertiary: "#84a59d", highlight: "rgba(143, 159, 169, 0.15)", textHighlight: "#b3aa0288" },
                },
              },
            },
            plugins: {
              transformers: [
                Plugin.FrontMatter(),
                Plugin.CreatedModifiedDate({ priority: ["frontmatter", "git", "filesystem"] }),
                Plugin.SyntaxHighlighting({ theme: { light: "github-light", dark: "github-dark" }, keepBackground: false }),
                Plugin.ObsidianFlavoredMarkdown({ enableInHtmlEmbed: false }),
                Plugin.GitHubFlavoredMarkdown(),
                Plugin.TableOfContents(),
                Plugin.CrawlLinks({ markdownLinkResolution: "shortest" }),
                Plugin.Description(),
                Plugin.Latex({ renderEngine: "katex" }),
              ],
              filters: [Plugin.RemoveDrafts()],
              emitters: [
                Plugin.AliasRedirects(), Plugin.ComponentResources(), Plugin.ContentPage(),
                Plugin.FolderPage(), Plugin.TagPage(),
                Plugin.ContentIndex({ enableSiteMap: true, enableRSS: true }),
                Plugin.Assets(), Plugin.Static(), Plugin.Favicon(), Plugin.NotFoundPage(),
              ],
            },
          }
          export default config
          QCONFIG

      - name: Build Quartz
        run: cd quartz && npx quartz build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::750370630820:role/pi-vault-deploy
          aws-region: eu-west-3

      - name: Upload PDFs to S3
        run: |
          for f in PDFs/*.pdf; do
            base=$(basename "$f")
            s3name=$(echo "$base" | sed 's/ /-/g')
            aws s3 cp "$f" "s3://physical-intelligence-vault/PDFs/$s3name" --region eu-west-3
          done

      - name: Deploy site to S3
        run: aws s3 sync quartz/public/ s3://physical-intelligence-vault --region eu-west-3 --delete --exclude "PDFs/*"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3J47GT0T5TFUW --paths "/*" --region us-east-1
