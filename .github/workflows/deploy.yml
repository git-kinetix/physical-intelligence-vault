name: Build and Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout vault
        uses: actions/checkout@v4

      - name: Checkout site (customized Quartz)
        uses: actions/checkout@v4
        with:
          repository: git-kinetix/physical-intelligence-site
          path: site

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd site && npm ci

      - name: Copy vault content to site
        run: |
          rm -rf site/content/*
          cp -r Papers site/content/Papers
          cp -r Metrics site/content/Metrics
          cp -r Datasets site/content/Datasets
          cp MOC.md site/content/index.md
          cp "Metrics Index.md" site/content/
          cp "Datasets Index.md" site/content/

      - name: Convert PDF embeds to iframes
        run: |
          cd site/content/Papers
          for f in *.md; do
            if grep -q '^!PDFs/' "$f" || grep -q '!\[\[PDFs/' "$f"; then
              sed -i 's|^!\[\[PDFs/\(.*\)\.pdf\]\]|<iframe src="/PDFs/\1.pdf" width="100%" height="800px" style="border: 1px solid #333; border-radius: 8px; margin-bottom: 1em;"></iframe>|' "$f"
              sed -i 's|^!PDFs/\(.*\)\.pdf|<iframe src="/PDFs/\1.pdf" width="100%" height="800px" style="border: 1px solid #333; border-radius: 8px; margin-bottom: 1em;"></iframe>|' "$f"
            fi
          done

      - name: Build site
        run: cd site && npx quartz build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::750370630820:role/pi-vault-deploy
          aws-region: eu-west-3

      - name: Upload PDFs to S3
        run: |
          for f in PDFs/*.pdf; do
            base=$(basename "$f")
            s3name=$(echo "$base" | sed 's/ /-/g')
            aws s3 cp "$f" "s3://physical-intelligence-vault/PDFs/$s3name" --region eu-west-3
          done

      - name: Deploy site to S3
        run: aws s3 sync site/public/ s3://physical-intelligence-vault --region eu-west-3 --delete --exclude "PDFs/*"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E3J47GT0T5TFUW --paths "/*" --region us-east-1
